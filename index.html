<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sethi.AI — AI Prompts & Playbooks</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  /* ── Reset & Base ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --orange: #F47A1F;
    --gold:   #E8B848;
    --black:  #111111;
    --charcoal: #2A2A2A;
    --grey:   #BDBDBD;
    --white:  #FFFFFF;
    --bg:     #111111;
    --card-bg: #1A1A1A;
    --card-border: #2A2A2A;
    --radius: 12px;
    --max-w:  800px;
  }

  html { font-size: 16px; -webkit-font-smoothing: antialiased; }

  body {
    background: var(--bg);
    color: var(--white);
    font-family: 'Inter', sans-serif;
    line-height: 1.6;
    min-height: 100vh;
  }

  a { text-decoration: none; color: inherit; }

  /* ── Layout ── */
  .wrap {
    max-width: var(--max-w);
    margin: 0 auto;
    padding: 0 24px;
  }

  /* ── Header ── */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(17,17,17,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--card-border);
  }

  .header-inner {
    max-width: var(--max-w);
    margin: 0 auto;
    padding: 0 24px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    font-family: 'Anton', sans-serif;
    font-size: 20px;
    letter-spacing: 0.5px;
    color: var(--white);
  }
  .logo span { color: var(--orange); }

  .insta-link {
    font-size: 13px;
    font-weight: 500;
    color: var(--grey);
    letter-spacing: 0.2px;
    transition: color 0.2s;
  }
  .insta-link:hover { color: var(--orange); }

  /* ── Hero ── */
  .hero {
    padding: 56px 0 40px;
    border-bottom: 1px solid var(--card-border);
  }

  .hero-label {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--orange);
    margin-bottom: 16px;
  }
  .hero-label::before {
    content: '';
    display: inline-block;
    width: 20px;
    height: 2px;
    background: var(--orange);
    border-radius: 2px;
  }

  .hero h1 {
    font-family: 'Anton', sans-serif;
    font-size: clamp(36px, 6vw, 52px);
    line-height: 1.05;
    letter-spacing: 0.5px;
    color: var(--white);
    margin-bottom: 14px;
  }

  .hero p {
    font-size: 16px;
    font-weight: 400;
    color: var(--grey);
    line-height: 1.6;
    max-width: 480px;
  }

  /* ── Controls ── */
  .controls {
    padding: 28px 0 8px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 4px;
  }

  .tab {
    font-size: 13px;
    font-weight: 500;
    color: var(--grey);
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    transition: color 0.2s, background 0.2s;
    background: transparent;
    border: none;
    font-family: 'Inter', sans-serif;
    letter-spacing: 0.2px;
  }
  .tab:hover { color: var(--white); }
  .tab.active {
    color: var(--white);
    background: var(--charcoal);
  }

  /* Filter pills */
  .filters {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    font-weight: 500;
    padding: 7px 16px;
    border-radius: 100px;
    border: 1px solid var(--card-border);
    cursor: pointer;
    background: transparent;
    color: var(--grey);
    font-family: 'Inter', sans-serif;
    transition: all 0.18s;
    letter-spacing: 0.1px;
  }
  .pill:hover {
    border-color: #444;
    color: var(--white);
  }
  .pill.active {
    background: var(--orange);
    border-color: var(--orange);
    color: var(--white);
  }
  .pill .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: currentColor;
    opacity: 0.7;
  }

  /* ── Count line ── */
  .count-line {
    padding: 20px 0 12px;
    font-size: 12px;
    font-weight: 500;
    color: #555;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  /* ── Cards ── */
  #list {
    display: flex;
    flex-direction: column;
    gap: 2px;
    padding-bottom: 64px;
  }

  .card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: var(--radius);
    padding: 22px 24px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 16px;
    transition: border-color 0.18s, background 0.18s;
    cursor: pointer;
    margin-bottom: 10px;
  }
  .card:hover {
    border-color: #3A3A3A;
    background: #1E1E1E;
  }

  .card-left { flex: 1; min-width: 0; }

  .card-tag {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    margin-bottom: 8px;
    padding: 3px 8px;
    border-radius: 4px;
  }
  .tag-playbook {
    background: rgba(244, 122, 31, 0.12);
    color: var(--orange);
    border: 1px solid rgba(244, 122, 31, 0.25);
  }
  .tag-prompt {
    background: rgba(232, 184, 72, 0.1);
    color: var(--gold);
    border: 1px solid rgba(232, 184, 72, 0.2);
  }
  .tag-skill {
    background: rgba(100, 180, 255, 0.1);
    color: #64B4FF;
    border: 1px solid rgba(100, 180, 255, 0.2);
  }

  .card-title {
    font-family: 'Anton', sans-serif;
    font-size: 18px;
    line-height: 1.2;
    color: var(--white);
    letter-spacing: 0.3px;
    margin-bottom: 6px;
  }

  .card-desc {
    font-size: 14px;
    line-height: 1.55;
    color: #888;
    font-weight: 400;
  }

  .card-right {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    padding-top: 4px;
  }

  .card-arrow {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 1px solid var(--card-border);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #555;
    transition: all 0.18s;
  }
  .card:hover .card-arrow {
    border-color: var(--orange);
    color: var(--orange);
    background: rgba(244, 122, 31, 0.08);
  }

  /* Copy button for prompts */
  .copy-btn {
    margin-top: 12px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: #555;
    padding: 5px 10px;
    border-radius: 5px;
    border: 1px solid #2A2A2A;
    cursor: pointer;
    background: transparent;
    font-family: 'Inter', sans-serif;
    transition: all 0.15s;
    position: relative;
    z-index: 2;
  }
  .copy-btn:hover {
    color: var(--gold);
    border-color: rgba(232, 184, 72, 0.3);
    background: rgba(232, 184, 72, 0.05);
  }
  .copy-btn.copied {
    color: #4CAF50;
    border-color: rgba(76, 175, 80, 0.3);
  }

  /* ── Empty state ── */
  .empty {
    text-align: center;
    padding: 64px 24px;
    color: #444;
    font-size: 14px;
  }

  /* ── Loader ── */
  .loader {
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding: 8px 0;
  }
  .loader-card {
    height: 90px;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: var(--radius);
    animation: shimmer 1.4s infinite;
  }
  @keyframes shimmer {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 0.7; }
  }

  /* ── Footer ── */
  footer {
    border-top: 1px solid var(--card-border);
    padding: 24px 0;
    margin-top: 8px;
  }
  .footer-inner {
    max-width: var(--max-w);
    margin: 0 auto;
    padding: 0 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    color: #444;
  }
  .footer-inner a { color: #555; }
  .footer-inner a:hover { color: var(--orange); }

  /* ── Responsive ── */
  @media (max-width: 480px) {
    .hero { padding: 40px 0 32px; }
    .card { padding: 18px 18px; }
    .card-title { font-size: 16px; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-inner">
    <div class="logo">SETHI<span>.AI</span></div>
    <a class="insta-link" href="https://instagram.com/sethi.ai" target="_blank" rel="noopener">@sethi.ai ↗</a>
  </div>
</header>

<!-- MAIN -->
<main>
  <div class="wrap">

    <!-- HERO -->
    <section class="hero">
      <div class="hero-label">sethi.ai</div>
      <h1>AI Prompts<br>& Playbooks</h1>
      <p>Ready-made prompts and systems from @sethi.ai — built for clarity, execution, and results.</p>
    </section>

    <!-- CONTROLS -->
    <div class="controls">
      <!-- Tabs (UI only) -->
      <div class="tabs">
        <button class="tab active" data-tab="latest" onclick="setTab(this)">Latest</button>
        <button class="tab" data-tab="popular" onclick="setTab(this)">Popular</button>
        <button class="tab" data-tab="oldest" onclick="setTab(this)">Oldest</button>
      </div>

      <!-- Filter pills -->
      <div class="filters">
        <button class="pill active" data-filter="all" onclick="setFilter(this)">
          <span class="dot"></span> All
        </button>
        <button class="pill" data-filter="Prompt" onclick="setFilter(this)">
          <span class="dot"></span> Prompts
        </button>
        <button class="pill" data-filter="Playbook" onclick="setFilter(this)">
          <span class="dot"></span> Playbooks
        </button>
        <button class="pill" data-filter="Skill" onclick="setFilter(this)">
          <span class="dot"></span> Claude Skills
        </button>
      </div>
    </div>

    <!-- COUNT -->
    <div class="count-line" id="count-line"></div>

    <!-- LIST -->
    <div id="list">
      <!-- Skeleton loader -->
      <div class="loader">
        <div class="loader-card"></div>
        <div class="loader-card"></div>
        <div class="loader-card"></div>
      </div>
    </div>

  </div>
</main>

<!-- FOOTER -->
<footer>
  <div class="footer-inner">
    <span>© 2026 Sethi.AI</span>
    <a href="https://instagram.com/sethi.ai" target="_blank" rel="noopener">Follow @sethi.ai</a>
  </div>
</footer>

<script>
  // ── State ──
  let allItems = [];
  let activeFilter = 'all';
  let activeTab = 'latest';

  // ── Load data ──
  async function load() {
    try {
      const [prompts, playbooks] = await Promise.all([
        fetch('/prompts/index.json').then(r => r.json()),
        fetch('/playbooks/index.json').then(r => r.json()),
      ]);

      const p = prompts.map(x => ({ ...x, type: 'Prompt' }));
      const pb = playbooks.map(x => ({ ...x, type: 'Playbook' }));

      // Merge: playbooks first, then prompts (latest order)
      allItems = [...pb, ...p];

      render();
    } catch (e) {
      document.getElementById('list').innerHTML = '<div class="empty">Could not load content. Please refresh.</div>';
    }
  }

  // ── Filter & sort ──
  function getItems() {
    let items = allItems;
    if (activeFilter !== 'all') {
      items = items.filter(i => i.type === activeFilter);
    }
    // Tab sorting (UI logic — extend when you have date/view metadata)
    if (activeTab === 'oldest') items = [...items].reverse();
    return items;
  }

  // ── Render ──
  function render() {
    const list = document.getElementById('list');
    const items = getItems();
    const countLine = document.getElementById('count-line');

    countLine.textContent = `${items.length} item${items.length !== 1 ? 's' : ''}`;

    if (items.length === 0) {
      list.innerHTML = '<div class="empty">Nothing here yet.</div>';
      return;
    }

    list.innerHTML = items.map(item => {
      const tagClass = item.type === 'Playbook' ? 'tag-playbook'
                     : item.type === 'Skill'    ? 'tag-skill'
                     : 'tag-prompt';

      const copyBtn = item.type === 'Prompt'
        ? `<button class="copy-btn" onclick="copyPrompt(event, '${encodeURIComponent(item.url)}', this)">
             <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
               <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
               <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
             </svg>
             Copy
           </button>`
        : '';

      return `
        <a href="${item.url}">
          <div class="card">
            <div class="card-left">
              <div class="card-tag ${tagClass}">${item.type}</div>
              <div class="card-title">${item.title}</div>
              <div class="card-desc">${item.description || ''}</div>
              ${copyBtn}
            </div>
            <div class="card-right">
              <div class="card-arrow">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M5 12h14M12 5l7 7-7 7"/>
                </svg>
              </div>
            </div>
          </div>
        </a>
      `;
    }).join('');
  }

  // ── Copy prompt ──
  async function copyPrompt(e, encodedUrl, btn) {
    e.preventDefault();
    e.stopPropagation();
    try {
      const url = decodeURIComponent(encodedUrl);
      const res = await fetch(url);
      const html = await res.text();
      // Extract prompt text from page (looks for data-prompt or falls back to title)
      const parser = new DOMParser();
      const doc = parser.parseFromString(html, 'text/html');
      const promptEl = doc.querySelector('[data-prompt]') || doc.querySelector('.prompt-body') || doc.querySelector('main');
      const text = promptEl ? promptEl.textContent.trim() : url;
      await navigator.clipboard.writeText(text);
      btn.textContent = '✓ Copied';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg> Copy`;
        btn.classList.remove('copied');
      }, 2000);
    } catch {
      btn.textContent = 'Open →';
    }
  }

  // ── Tab ──
  function setTab(el) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    activeTab = el.dataset.tab;
    render();
  }

  // ── Filter ──
  function setFilter(el) {
    document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
    el.classList.add('active');
    activeFilter = el.dataset.filter;
    render();
  }

  load();
</script>

</body>
</html>
